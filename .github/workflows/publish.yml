name: Publish to PyPI
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (markdown). Leave empty for auto-generated notes.'
        required: false
        default: ''
        type: string
env:
    PYTHON_VERSION: "3.13"
    DFX_VERSION: "0.30.2"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump_version.outputs.NEW_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Bump version
        id: bump_version
        run: |
          CURRENT_VERSION=$(grep -Po '__version__ = "\K[^"]*' basilisk/__init__.py)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          case "${{ github.event.inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"
          
          # Update __init__.py
          sed -i "s/__version__ = \"$CURRENT_VERSION\"/__version__ = \"$NEW_VERSION\"/" basilisk/__init__.py
      
      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install build twine
          
          # Build and publish
          python -m build
          twine check dist/*
          twine upload dist/*
          
          echo "âś… Published to PyPI: ic-basilisk v${{ steps.bump_version.outputs.NEW_VERSION }}"
      
      - name: Commit and tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add basilisk/__init__.py
          git commit -m "Bump version to ${{ steps.bump_version.outputs.NEW_VERSION }}"
          git tag -a "v${{ steps.bump_version.outputs.NEW_VERSION }}" -m "Release v${{ steps.bump_version.outputs.NEW_VERSION }}"
          git push origin main --tags
      
      - name: Download template WASM from cpython-wasm release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The build-cpython-wasm.yml CI uploads the template to cpython-wasm-3.13.0 release.
          # Download it so we can attach it to the versioned release (v{version}),
          # which is where find_template_wasm() looks for it.
          gh release download cpython-wasm-3.13.0 \
            --pattern 'cpython_canister_template.wasm' \
            --dir "${{ runner.temp }}" \
            --clobber || echo "âš ď¸Ź  Template WASM not found in cpython-wasm-3.13.0 release (skipping)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          TEMPLATE_FLAG=""
          if [ -f "${{ runner.temp }}/cpython_canister_template.wasm" ]; then
            TEMPLATE_FLAG="${{ runner.temp }}/cpython_canister_template.wasm"
            echo "âś… Including template WASM in release"
          else
            echo "âš ď¸Ź  No template WASM to include"
          fi

          if [ -n "$RELEASE_NOTES" ]; then
            gh release create "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --title "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --notes "$RELEASE_NOTES" \
              $TEMPLATE_FLAG
          else
            gh release create "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --title "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --generate-notes \
              $TEMPLATE_FLAG
          fi

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test in Docker on IC mainnet
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          echo "$IC_IDENTITY_PEM" > /tmp/ci-identity.pem
          docker run --rm \
            -e VERSION="$VERSION" \
            -v /tmp/ci-identity.pem:/tmp/ci-identity.pem:ro \
            python:${{ env.PYTHON_VERSION }}-slim-bookworm bash -c '
              set -e

              apt-get update -qq && apt-get install -y -qq curl ca-certificates npm > /dev/null 2>&1
              npm install -g @icp-sdk/icp-cli > /dev/null 2>&1
              export PATH="$HOME/.local/share/icp/bin:$PATH"

              # Wait for PyPI propagation
              echo "Waiting for ic-basilisk==${VERSION} on PyPI..."
              for i in $(seq 1 30); do
                if pip install "ic-basilisk==${VERSION}" 2>&1 | grep -q "Successfully installed"; then
                  echo "âś… ic-basilisk==${VERSION} installed"
                  break
                fi
                echo "  retrying in 10s... (${i}/30)"
                sleep 10
              done
              basilisk --version | grep -q "${VERSION}" || { echo "::error::Version mismatch"; exit 1; }

              # Import IC identity
              icp identity import --from-pem /tmp/ci-identity.pem --storage plaintext ci-deploy
              icp identity default ci-deploy

              # Scaffold, deploy, test
              basilisk new smoke_test && cd smoke_test
              icp deploy -e ic

              RESULT=$(icp canister call smoke_test_backend status '\''()'\'' -e ic --query)
              echo "status: ${RESULT}"
              echo "${RESULT}" | grep -q "ok" || { echo "::error::status failed: ${RESULT}"; exit 1; }

              # Cleanup
              icp canister stop smoke_test_backend -e ic || true
              icp canister stop smoke_test_frontend -e ic || true
              icp canister delete smoke_test_backend -e ic || true
              icp canister delete smoke_test_frontend -e ic || true

              echo "âś… IC mainnet smoke test passed"
            '
          rm -f /tmp/ci-identity.pem
