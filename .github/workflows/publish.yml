name: Publish to PyPI
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (markdown). Leave empty for auto-generated notes.'
        required: false
        default: ''
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump_version.outputs.NEW_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Bump version
        id: bump_version
        run: |
          CURRENT_VERSION=$(grep -Po '__version__ = "\K[^"]*' basilisk/__init__.py)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          case "${{ github.event.inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"
          
          # Update __init__.py
          sed -i "s/__version__ = \"$CURRENT_VERSION\"/__version__ = \"$NEW_VERSION\"/" basilisk/__init__.py
      
      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install build twine
          
          # Build and publish
          python -m build
          twine check dist/*
          twine upload dist/*
          
          echo "✅ Published to PyPI: ic-basilisk v${{ steps.bump_version.outputs.NEW_VERSION }}"
      
      - name: Commit and tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add basilisk/__init__.py
          git commit -m "Bump version to ${{ steps.bump_version.outputs.NEW_VERSION }}"
          git tag -a "v${{ steps.bump_version.outputs.NEW_VERSION }}" -m "Release v${{ steps.bump_version.outputs.NEW_VERSION }}"
          git push origin main --tags
      
      - name: Download template WASM from cpython-wasm release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The build-cpython-wasm.yml CI uploads the template to cpython-wasm-3.13.0 release.
          # Download it so we can attach it to the versioned release (v{version}),
          # which is where find_template_wasm() looks for it.
          gh release download cpython-wasm-3.13.0 \
            --pattern 'cpython_canister_template.wasm' \
            --dir "${{ runner.temp }}" \
            --clobber || echo "⚠️  Template WASM not found in cpython-wasm-3.13.0 release (skipping)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          TEMPLATE_FLAG=""
          if [ -f "${{ runner.temp }}/cpython_canister_template.wasm" ]; then
            TEMPLATE_FLAG="${{ runner.temp }}/cpython_canister_template.wasm"
            echo "✅ Including template WASM in release"
          else
            echo "⚠️  No template WASM to include"
          fi

          if [ -n "$RELEASE_NOTES" ]; then
            gh release create "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --title "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --notes "$RELEASE_NOTES" \
              $TEMPLATE_FLAG
          else
            gh release create "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --title "v${{ steps.bump_version.outputs.NEW_VERSION }}" \
              --generate-notes \
              $TEMPLATE_FLAG
          fi

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install icp
        run: |
          npm install -g @icp-sdk/icp-cli
          echo "$HOME/.local/share/icp/bin" >> $GITHUB_PATH

      - name: Wait for PyPI propagation
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          echo "Waiting for ic-basilisk==${VERSION} on PyPI..."
          for i in $(seq 1 30); do
            if pip install "ic-basilisk==${VERSION}" --dry-run 2>&1 | grep -q "Would install"; then
              echo "✅ Version ${VERSION} available on PyPI after $((i * 10))s"
              exit 0
            fi
            echo "Not yet available, retrying in 10s... (attempt ${i}/30)"
            sleep 10
          done
          echo "::error::ic-basilisk==${VERSION} not found on PyPI after 5 minutes"
          exit 1

      - name: Install from PyPI
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          pip install "ic-basilisk==${VERSION}"
          INSTALLED=$(basilisk --version)
          echo "Installed: ${INSTALLED}"
          echo "${INSTALLED}" | grep -q "${VERSION}" || {
            echo "::error::Version mismatch: expected ${VERSION}, got ${INSTALLED}"
            exit 1
          }

      - name: Scaffold project
        run: |
          basilisk new smoke_test
          test -f smoke_test/icp.yaml
          test -f smoke_test/src/main.py
          echo "✅ Project scaffolded"

      - name: Build canister (tests template WASM download)
        working-directory: smoke_test
        run: |
          CANISTER_CANDID_PATH=./smoke_test.did python -m basilisk smoke_test src/main.py
          test -f .basilisk/smoke_test/smoke_test.wasm
          echo "✅ WASM built: $(wc -c < .basilisk/smoke_test/smoke_test.wasm) bytes"

      - name: Configure system subnet for PocketIC
        run: |
          mkdir -p ~/.config/icp
          echo '{"local":{"type":"ephemeral","replica":{"subnet_type":"system"}}}' > ~/.config/icp/networks.json

      - name: Deploy to local replica and test
        working-directory: smoke_test
        run: |
          icp network start -d
          icp deploy

          RESULT=$(icp canister call smoke_test greet '("World")' --query)
          echo "greet result: ${RESULT}"
          echo "${RESULT}" | grep -q "Hello, World" || {
            echo "::error::Unexpected greet result: ${RESULT}"
            exit 1
          }

          icp canister call smoke_test increment '()'
          RESULT=$(icp canister call smoke_test get_counter '()' --query)
          echo "counter result: ${RESULT}"
          echo "${RESULT}" | grep -q "1" || {
            echo "::error::Counter should be 1, got: ${RESULT}"
            exit 1
          }

          echo "✅ Local deploy and canister calls verified"
