# Local Tests — build and test example canisters on a local dfx replica.
#
# Architecture: build-once + deploy-only
#   1. build-wasms: Single runner builds ALL example WASMs (~minutes total
#      in CPython template mode) and uploads as artifact.
#   2. local-tests (6 shards): Each shard downloads pre-built WASMs,
#      deploys via `dfx canister install --wasm` (no rebuild), and runs tests.

name: Local Tests

on:
    pull_request:
    workflow_call:
    workflow_dispatch:

env:
    BASILISK_PYTHON_BACKEND: cpython
    BASILISK_COMPILE_RUST_PYTHON_STDLIB: false
    WASI_SDK_VERSION: "24"
    WASI_SDK_PATH: /home/runner/.local/share/wasi-sdk
    PYTHON_VERSION: "3.13"
    DFX_VERSION: "0.30.2"

jobs:
    # -----------------------------------------------------------------------
    # Job 1: Build all example WASMs in a single runner
    # -----------------------------------------------------------------------
    build-wasms:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache basilisk cargo
              uses: actions/cache@v4
              with:
                  path: ~/.config/basilisk
                  key: basilisk-cargo-cpython-v4-${{ hashFiles('basilisk/cargotoml.py') }}

            - name: Cache dfx
              uses: actions/cache@v4
              with:
                  path: ~/.cache/dfinity
                  key: basilisk-dfx-${{ env.DFX_VERSION }}

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=${{ env.DFX_VERSION }} sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Install WASI SDK
              run: |
                  curl -LO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  tar xzf wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  mv wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux ~/.local/share/wasi-sdk

            - name: Install wasm-opt (binaryen)
              run: |
                  curl -L https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz -o /tmp/binaryen.tar.gz
                  tar xzf /tmp/binaryen.tar.gz -C /tmp
                  sudo cp /tmp/binaryen-version_116/bin/wasm-opt /usr/local/bin/
                  wasm-opt --version

            - name: Pre-download canister template
              run: |
                  VERSION=$(python3 -c "import ast; t=ast.parse(open('basilisk/__init__.py').read()); print([n.value.value for n in ast.walk(t) if isinstance(n, ast.Assign) and any(t.id=='__version__' for t in n.targets if isinstance(t, ast.Name))][0])")
                  TEMPLATE_PATH="$HOME/.config/basilisk/${VERSION}/cpython_canister_template.wasm"
                  mkdir -p "$(dirname $TEMPLATE_PATH)"
                  curl -Lf https://github.com/smart-social-contracts/basilisk/releases/download/cpython-wasm-3.13.0/cpython_canister_template.wasm -o "$TEMPLATE_PATH"

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Create venv
              run: python -m venv venv

            - name: Install basilisk from repo
              shell: bash -l {0}
              run: source venv/bin/activate && pip install -e .

            - name: Install dfx extension
              run: source venv/bin/activate && python -m basilisk install-dfx-extension

            - name: Build all example WASMs
              shell: bash -l {0}
              timeout-minutes: 60
              run: |
                  source venv/bin/activate
                  python scripts/build_all_wasms.py

            - name: Package pre-built WASMs
              run: |
                  find tests/fixtures -path '*/.basilisk/*.wasm' | head -20
                  echo "---"
                  find tests/fixtures -path '*/.basilisk/*.wasm' | wc -l
                  tar czf example-wasms.tar.gz $(find tests/fixtures -name '.basilisk' -type d)
                  ls -lh example-wasms.tar.gz

            - name: Upload pre-built WASMs
              uses: actions/upload-artifact@v4
              with:
                  name: example-wasms
                  path: example-wasms.tar.gz
                  retention-days: 1

    # -----------------------------------------------------------------------
    # Job 2: Run tests using pre-built WASMs (no compilation needed)
    # -----------------------------------------------------------------------
    integration-tests:
        needs: build-wasms
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shard:
                    - name: "simple-a"
                      tests: "tests/integration/test_counter.py tests/integration/test_query.py tests/integration/test_update.py tests/integration/test_date.py tests/integration/test_primitive_types.py tests/integration/test_annotated_tests.py tests/integration/test_blob_array.py tests/integration/test_bytes.py tests/integration/test_complex_init.py tests/integration/test_complex_types.py"
                    - name: "simple-b"
                      tests: "tests/integration/test_guard_functions.py tests/integration/test_filesystem.py tests/integration/test_generators.py tests/integration/test_timers.py tests/integration/test_inspect_message.py tests/integration/test_ic_api.py tests/integration/test_imports.py tests/integration/test_key_value_store.py tests/integration/test_keywords.py tests/integration/test_null_example.py"
                    - name: "simple-c"
                      tests: "tests/integration/test_manual_reply.py tests/integration/test_simple_erc20.py tests/integration/test_simple_user_accounts.py tests/integration/test_audio_recorder.py tests/integration/test_principal.py tests/integration/test_call_raw.py tests/integration/test_init.py tests/integration/test_optional_types.py tests/integration/test_list_of_lists.py tests/integration/test_tuple_types.py"
                    - name: "advanced"
                      tests: "tests/integration/test_stable_memory.py tests/integration/test_stable_structures.py tests/integration/test_stdlib.py tests/integration/test_randomness.py tests/integration/test_rejections.py tests/integration/test_outgoing_http_requests.py tests/integration/test_init_and_post_upgrade_recovery.py"
                    - name: "multi-canister"
                      tests: "tests/integration/test_cycles.py tests/integration/test_heartbeat.py tests/integration/test_management_canister.py tests/integration/test_notify_raw.py tests/integration/test_service.py"
                    - name: "motoko"
                      tests: "tests/integration/test_motoko_calc.py tests/integration/test_motoko_counter.py tests/integration/test_motoko_echo.py tests/integration/test_motoko_factorial.py tests/integration/test_motoko_hello.py tests/integration/test_motoko_hello_world.py tests/integration/test_motoko_persistent_storage.py tests/integration/test_motoko_phone_book.py tests/integration/test_motoko_quicksort.py tests/integration/test_motoko_simple_todo.py tests/integration/test_motoko_superheroes.py tests/integration/test_motoko_whoami.py"
        name: "Integration (${{ matrix.shard.name }})"
        steps:
            - uses: actions/checkout@v4

            - name: Download pre-built WASMs
              uses: actions/download-artifact@v4
              with:
                  name: example-wasms

            - name: Extract pre-built WASMs
              run: |
                  tar xzf example-wasms.tar.gz
                  find tests/fixtures -path '*/.basilisk/*.wasm' | wc -l

            - name: Cache dfx
              uses: actions/cache@v4
              with:
                  path: ~/.cache/dfinity
                  key: basilisk-dfx-${{ env.DFX_VERSION }}

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=${{ env.DFX_VERSION }} sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install pytest
              run: pip install pytest

            - name: Run integration tests
              timeout-minutes: 30
              env:
                  BASILISK_PREBUILT_WASMS: "1"
              run: |
                  pytest ${{ matrix.shard.tests }} -v --tb=short 2>&1
