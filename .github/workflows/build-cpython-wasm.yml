# Build CPython 3.13 for wasm32-wasip1 and publish as a GitHub release artifact.
# This runs manually or when the CPython build scripts change.
# The resulting tarball is downloaded by install_cpython_wasm.sh during canister builds.

name: Build CPython Wasm

on:
    workflow_dispatch: # Manual trigger
    push:
        branches:
            - main
        paths:
            - 'basilisk/compiler/cpython/**'
            - 'basilisk/compiler/basilisk_cpython/**'
            - 'basilisk/compiler/cpython_canister_template/**'

permissions:
    contents: write # Required for creating GitHub releases

jobs:
    build-cpython-wasm:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        env:
            CPYTHON_VERSION: "3.13.0"
            WASI_SDK_VERSION: "24"
        steps:
            - uses: actions/checkout@v3

            - name: Cache CPython and zlib sources
              uses: actions/cache@v3
              with:
                  path: ~/.cache/basilisk/cpython
                  key: cpython-zlib-source-${{ env.CPYTHON_VERSION }}

            - name: Cache CPython wasm build
              uses: actions/cache@v3
              id: cpython-wasm-cache
              with:
                  path: ~/cpython-wasm-output
                  key: cpython-wasm-${{ env.CPYTHON_VERSION }}-wasi-sdk-${{ env.WASI_SDK_VERSION }}-${{ hashFiles('basilisk/compiler/cpython/build_cpython_wasm.sh') }}

            - name: Install WASI SDK
              if: steps.cpython-wasm-cache.outputs.cache-hit != 'true'
              run: |
                  echo "Downloading WASI SDK ${{ env.WASI_SDK_VERSION }}..."
                  curl -fLO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  tar xzf wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  sudo mv wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux /opt/wasi-sdk
                  echo "WASI SDK installed at /opt/wasi-sdk"
                  /opt/wasi-sdk/bin/clang --version

            - name: Build CPython for wasm32-wasip1
              if: steps.cpython-wasm-cache.outputs.cache-hit != 'true'
              run: |
                  WASI_SDK_PATH=/opt/wasi-sdk \
                  bash basilisk/compiler/cpython/build_cpython_wasm.sh ~/cpython-wasm-output

            - name: Verify build output
              run: |
                  echo "=== Build output ==="
                  ls -la ~/cpython-wasm-output/lib/libpython3.13.a
                  ls -la ~/cpython-wasm-output/include/Python.h
                  du -sh ~/cpython-wasm-output/

            - name: Create release tarball
              run: |
                  cd ~/cpython-wasm-output
                  tar czf ${{ runner.temp }}/cpython-wasm32-wasip1.tar.gz .
                  echo "Tarball size: $(du -sh ${{ runner.temp }}/cpython-wasm32-wasip1.tar.gz | cut -f1)"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cpython-wasm32-wasip1
                  path: ${{ runner.temp }}/cpython-wasm32-wasip1.tar.gz
                  retention-days: 90

            - name: Create/Update GitHub Release
              if: github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: cpython-wasm-${{ env.CPYTHON_VERSION }}
                  name: CPython ${{ env.CPYTHON_VERSION }} wasm32-wasip1
                  body: |
                      Pre-built CPython ${{ env.CPYTHON_VERSION }} static library for wasm32-wasip1.
                      Used by `install_cpython_wasm.sh` during basilisk canister builds.
                      
                      Contents:
                      - `lib/libpython3.13.a` — static library
                      - `include/` — CPython headers
                      - `lib/python3.13/` — frozen stdlib modules
                  files: ${{ runner.temp }}/cpython-wasm32-wasip1.tar.gz
                  draft: false
                  prerelease: false
                  make_latest: false

    build-canister-template:
        runs-on: ubuntu-latest
        needs: build-cpython-wasm
        timeout-minutes: 30
        env:
            CPYTHON_VERSION: "3.13.0"
            WASI_SDK_VERSION: "24"
        steps:
            - uses: actions/checkout@v3

            - name: Download CPython wasm artifact
              uses: actions/download-artifact@v4
              with:
                  name: cpython-wasm32-wasip1
                  path: ${{ runner.temp }}

            - name: Extract CPython wasm
              run: |
                  mkdir -p ~/cpython-wasm
                  tar xzf ${{ runner.temp }}/cpython-wasm32-wasip1.tar.gz -C ~/cpython-wasm

            - name: Install WASI SDK
              run: |
                  curl -fLO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  tar xzf wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  sudo mkdir -p /usr/local/share/wasi-sdk
                  sudo mv wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux/* /usr/local/share/wasi-sdk/
                  # Also create the symlink expected by basilisk_cpython build.rs
                  sudo mkdir -p ~/.local/share/wasi-sdk/share
                  sudo ln -sf /usr/local/share/wasi-sdk/share/wasi-sysroot ~/.local/share/wasi-sdk/share/wasi-sysroot

            - name: Install Rust wasm32-wasip1 target
              run: rustup target add wasm32-wasip1

            - name: Install wasi2ic
              run: cargo install wasi2ic

            - name: Install wasm-opt (binaryen v116)
              run: |
                  curl -L https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz -o /tmp/binaryen.tar.gz
                  tar xzf /tmp/binaryen.tar.gz -C /tmp
                  sudo cp /tmp/binaryen-version_116/bin/wasm-opt /usr/local/bin/
                  wasm-opt --version

            - name: Build canister template
              run: |
                  CPYTHON_WASM_DIR=~/cpython-wasm \
                  cargo build \
                    --manifest-path=basilisk/compiler/cpython_canister_template/Cargo.toml \
                    --target=wasm32-wasip1 \
                    --release

            - name: Post-process template wasm
              run: |
                  TEMPLATE_SRC=basilisk/compiler/cpython_canister_template/target/wasm32-wasip1/release/cpython_canister_template.wasm
                  wasi2ic "$TEMPLATE_SRC" ${{ runner.temp }}/template_wasi2ic.wasm
                  wasm-opt -Oz --closed-world --converge ${{ runner.temp }}/template_wasi2ic.wasm -o ${{ runner.temp }}/cpython_canister_template.wasm
                  echo "Template wasm size: $(du -sh ${{ runner.temp }}/cpython_canister_template.wasm | cut -f1)"
                  ls -la ${{ runner.temp }}/cpython_canister_template.wasm

            - name: Upload template artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cpython-canister-template
                  path: ${{ runner.temp }}/cpython_canister_template.wasm
                  retention-days: 90

            - name: Add template to GitHub Release
              if: github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: cpython-wasm-${{ env.CPYTHON_VERSION }}
                  files: ${{ runner.temp }}/cpython_canister_template.wasm
                  draft: false
                  prerelease: false
                  make_latest: false
