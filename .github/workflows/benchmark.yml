name: Benchmark
on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Python backend to benchmark'
        required: true
        type: choice
        options:
          - rustpython
          - cpython

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      BASILISK_PYTHON_BACKEND: ${{ github.event.inputs.backend }}
      BASILISK_COMPILE_RUST_PYTHON_STDLIB: ${{ github.event.inputs.backend == 'rustpython' }}
      WASI_SDK_VERSION: "24"
      WASI_SDK_PATH: /home/runner/.local/share/wasi-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache basilisk cargo
        uses: actions/cache@v4
        with:
          path: ~/.config/basilisk
          key: basilisk-cargo-${{ github.event.inputs.backend }}-benchmark-v2-${{ hashFiles('basilisk/cargotoml.py') }}

      - name: Cache dfx
        uses: actions/cache@v4
        with:
          path: ~/.cache/dfinity
          key: basilisk-dfx-0.29.0

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=true DFX_VERSION=0.29.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

      # CPython template mode: download pre-built template wasm + wasm-opt
      - name: Install wasm-opt (binaryen)
        if: ${{ github.event.inputs.backend == 'cpython' }}
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz -o /tmp/binaryen.tar.gz
          tar xzf /tmp/binaryen.tar.gz -C /tmp
          sudo cp /tmp/binaryen-version_116/bin/wasm-opt /usr/local/bin/
          wasm-opt --version

      - name: Download canister template wasm
        if: ${{ github.event.inputs.backend == 'cpython' }}
        run: |
          VERSION=$(python3 -c "import ast; t=ast.parse(open('basilisk/__init__.py').read()); print([n.value.value for n in ast.walk(t) if isinstance(n, ast.Assign) and any(t.id=='__version__' for t in n.targets if isinstance(t, ast.Name))][0])")
          TEMPLATE_DIR="$HOME/.config/basilisk/${VERSION}"
          mkdir -p "${TEMPLATE_DIR}"
          echo "Downloading canister template wasm..."
          curl -Lf https://github.com/smart-social-contracts/basilisk/releases/download/cpython-wasm-3.13.0/cpython_canister_template.wasm \
            -o "${TEMPLATE_DIR}/cpython_canister_template.wasm"
          echo "Template wasm: $(wc -c < "${TEMPLATE_DIR}/cpython_canister_template.wasm") bytes"

      - name: Setup Python environment
        working-directory: examples/benchmark
        run: |
          curl https://pyenv.run | bash
          ~/.pyenv/bin/pyenv install 3.10.7
          ~/.pyenv/versions/3.10.7/bin/python -m venv venv

      - name: Install basilisk from repo
        shell: bash -l {0}
        working-directory: examples/benchmark
        run: source venv/bin/activate && pip install ../..

      - name: Install dfx extension
        working-directory: examples/benchmark
        run: source venv/bin/activate && python -m basilisk install-dfx-extension

      - name: Configure system subnet
        run: |
          mkdir -p ~/.config/dfx
          echo '{"local":{"type":"ephemeral","replica":{"subnet_type":"system"}}}' > ~/.config/dfx/networks.json

      - name: Start dfx
        working-directory: examples/benchmark
        run: dfx start --clean --background --host 127.0.0.1:8000 --pocketic

      - name: Deploy and run benchmark
        shell: bash -l {0}
        working-directory: examples/benchmark/test
        timeout-minutes: 65
        run: source ../venv/bin/activate && npm install && npm test

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.event.inputs.backend }}
          path: examples/benchmark/benchmark_results_${{ github.event.inputs.backend }}.json
