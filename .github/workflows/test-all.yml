# Orchestrator workflow that runs all test suites on push to main.
# First builds the CPython WASM template (if template paths changed),
# then runs all test suites in parallel.
#
# Shell tests use a live canister on IC mainnet (ru4ga-siaaa-aaaai-q7f3a-cai).
# The canister is started before tests and stopped after to save idle cycles.
# Ensure the canister has enough cycles above its freezing threshold (~1.6 TC).

name: All Tests
on:
    push:
        branches:
            - main

concurrency:
    group: ci-main-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write # Required by build-cpython-wasm for GitHub releases
    actions: write  # Required by build-cpython-wasm for workflow dispatch

jobs:
    wasm-build:
        uses: ./.github/workflows/build-cpython-wasm.yml
        secrets: inherit

    upgrade-test:
        needs: wasm-build
        if: ${{ !cancelled() && needs.wasm-build.result != 'failure' }}
        uses: ./.github/workflows/test-upgrade.yml
        secrets: inherit

    setup-shell-canister:
        needs: wasm-build
        if: ${{ !cancelled() && needs.wasm-build.result != 'failure' }}
        runs-on: ubuntu-latest
        env:
            DFX_WARNING: -mainnet_plaintext_identity
            CANISTER_ID: ru4ga-siaaa-aaaai-q7f3a-cai
            NETWORK: ic
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.29.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Import DFX identity
              run: |
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext 2>/dev/null || true
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Install basilisk
              run: pip install -e .

            - name: Build test canister WASM
              working-directory: tests/test_canister
              run: |
                  CANISTER_CANDID_PATH=./shell_test.did python -m basilisk shell_test src/main.py
                  ls -la .basilisk/shell_test/shell_test.wasm

            - name: Reinstall canister with fresh WASM
              working-directory: tests/test_canister
              run: |
                  echo "Stopping canister $CANISTER_ID..."
                  dfx canister stop "$CANISTER_ID" --network "$NETWORK" 2>/dev/null || true
                  sleep 3
                  echo "Reinstalling canister with fresh WASM..."
                  dfx canister install "$CANISTER_ID" --mode reinstall --yes --network "$NETWORK" --wasm .basilisk/shell_test/shell_test.wasm
                  echo "Starting canister..."
                  dfx canister start "$CANISTER_ID" --network "$NETWORK"
                  echo "Verifying canister is reachable..."
                  dfx canister call "$CANISTER_ID" status --network "$NETWORK"

    shell-tests:
        needs: setup-shell-canister
        if: ${{ !cancelled() && needs.setup-shell-canister.result == 'success' }}
        uses: ./.github/workflows/test-shell.yml
        secrets: inherit

    teardown-shell-canister:
        needs: shell-tests
        if: always()
        runs-on: ubuntu-latest
        env:
            DFX_WARNING: -mainnet_plaintext_identity
            CANISTER_ID: ru4ga-siaaa-aaaai-q7f3a-cai
            NETWORK: ic
        steps:
            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.29.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Import DFX identity
              run: |
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext 2>/dev/null || true
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Stop canister
              run: |
                  echo "Stopping canister $CANISTER_ID on $NETWORK..."
                  dfx canister stop "$CANISTER_ID" --network "$NETWORK" || true

    integration-tests:
        needs: wasm-build
        if: ${{ !cancelled() && needs.wasm-build.result != 'failure' }}
        uses: ./.github/workflows/test-integration.yml
        secrets: inherit
