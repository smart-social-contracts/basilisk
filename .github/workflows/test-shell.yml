# IC Tests — Basilisk CDK runtime features (shell exec, filesystem, guards).
# These run against a live canister on IC mainnet. The canister must already be deployed.
# Toolkit-specific IC tests (tasks, wallet, fx, crypto, vetkeys) live in ic-basilisk-toolkit.

name: IC Tests

env:
    PYTHON_VERSION: "3.13"
    DFX_VERSION: "0.30.2"

concurrency:
    group: ic-tests-mainnet
    cancel-in-progress: true

on:
    pull_request:
    workflow_call:
    workflow_dispatch:
        inputs:
            test_filter:
                description: "Pytest filter (-k expression), leave empty to run all"
                required: false
                type: string
                default: ""
            canister:
                description: "Canister ID to test against"
                required: false
                type: string
                default: "2i66l-saaaa-aaaas-qe3sq-cai"
            network:
                description: "IC network"
                required: false
                type: choice
                default: ic
                options:
                    - ic
                    - local

jobs:
    ic-tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - shard: shell
                      pytest_args: tests/test_shell.py
                    - shard: filesystem
                      pytest_args: tests/test_filesystem.py tests/test_sftp.py
                    - shard: guards
                      pytest_args: tests/test_guards.py
        env:
            DFX_WARNING: -mainnet_plaintext_identity
            BASILISK_TEST_CANISTER: ${{ inputs.canister || '2i66l-saaaa-aaaas-qe3sq-cai' }}
            BASILISK_TEST_NETWORK: ${{ inputs.network || 'ic' }}
        name: ic-tests (${{ matrix.shard }})
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=${{ env.DFX_VERSION }} sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Import DFX identity
              run: |
                  if [ -z "${{ secrets.IC_IDENTITY_PEM }}" ]; then
                    echo "::error::IC_IDENTITY_PEM secret is not set."
                    exit 1
                  fi
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext 2>/dev/null || true
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: |
                  pip install -e ".[test]"
                  pip install asyncssh

            - name: Run tests (${{ matrix.shard }})
              run: |
                  FILTER="${{ inputs.test_filter }}"
                  if [ -n "$FILTER" ]; then
                    PYTHONPATH=. python -m pytest tests/ -v -k "$FILTER"
                  else
                    PYTHONPATH=. python -m pytest ${{ matrix.pytest_args }} -v
                  fi
