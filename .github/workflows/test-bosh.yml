# On-demand integration tests for Basilisk OS (bosh shell, filesystem, SFTP, tasks).
# These run against a LIVE canister on IC mainnet — they are not local unit tests.

name: Bosh Integration Tests

on:
    workflow_dispatch:
        inputs:
            test_filter:
                description: "Pytest filter (-k expression), leave empty to run all"
                required: false
                type: string
                default: ""
            canister:
                description: "Canister ID to test against"
                required: false
                type: string
                default: "ru4ga-siaaa-aaaai-q7f3a-cai"
            network:
                description: "IC network"
                required: false
                type: choice
                default: ic
                options:
                    - ic
                    - local

jobs:
    bosh-tests:
        runs-on: ubuntu-latest
        env:
            DFX_WARNING: -mainnet_plaintext_identity
            BOSH_TEST_CANISTER: ${{ inputs.canister }}
            BOSH_TEST_NETWORK: ${{ inputs.network }}
        steps:
            - uses: actions/checkout@v4

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.29.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Import DFX identity
              run: |
                  if [ -z "${{ secrets.IC_IDENTITY_PEM }}" ]; then
                    echo "::error::IC_IDENTITY_PEM secret is not set."
                    exit 1
                  fi
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext 2>/dev/null || true
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: |
                  pip install -e ".[bosh,test]"

            - name: Verify canister reachable
              run: |
                  dfx canister call "$BOSH_TEST_CANISTER" execute_code_shell '("print(\"ping\")",)' --network "$BOSH_TEST_NETWORK"

            - name: Diagnostic - debug task list
              run: |
                  PYTHONPATH=. python3 -c "
import os, subprocess
from basilisk.bosh import canister_exec, _TASK_RESOLVE, _task_list_code, _parse_candid, _run_dfx_with_retries

c = os.environ['BOSH_TEST_CANISTER']
n = os.environ['BOSH_TEST_NETWORK']

# 1) What's in the namespace?
r1 = canister_exec(\"print('Task' in dir(), 'Codex' in dir())\", c, n)
print(f'[DIAG1] namespace: {r1!r}')

# 2) Run _TASK_RESOLVE alone
r2 = canister_exec(_TASK_RESOLVE + \"print('AFTER_RESOLVE:', 'Task' in dir(), 'Codex' in dir())\", c, n)
print(f'[DIAG2] after resolve: {r2!r}')

# 3) Try simple Task.count()
r3 = canister_exec(\"print('count=', Task.count() if 'Task' in dir() else 'N/A')\", c, n)
print(f'[DIAG3] count: {r3!r}')

# 4) Run full _task_list_code and show raw dfx output
code = _task_list_code()
escaped = code.replace('\"', '\\\\\"').replace('\\n', '\\\\n')
cmd = ['dfx', 'canister', 'call', '--network', n, c, 'execute_code_shell', f'(\"{escaped}\")']
r = subprocess.run(cmd, capture_output=True, text=True, timeout=120)
print(f'[DIAG4] raw stdout: {r.stdout!r}')
print(f'[DIAG4] raw stderr: {r.stderr!r}')
print(f'[DIAG4] returncode: {r.returncode}')
print(f'[DIAG4] parsed: {_parse_candid(r.stdout)!r}')

# 5) Run canister_exec with _task_list_code
r5 = canister_exec(code, c, n)
print(f'[DIAG5] canister_exec result: {r5!r}')
"

            - name: Run tests
              run: |
                  FILTER="${{ inputs.test_filter }}"
                  if [ -n "$FILTER" ]; then
                    PYTHONPATH=. python -m pytest tests/ -v -k "$FILTER"
                  else
                    PYTHONPATH=. python -m pytest tests/ -v
                  fi
