# TODO the next great simplification might be deploying multiple examples to one dfx replica instance: https://forum.dfinity.org/t/use-the-same-local-replica-for-multiple-projects/11900
# TODO this might allow us to avoid spinning up so many jobs in the matrix

# This GitHub Action flow works as follows:
# The tests are currently simple example-based integration tests.
# Each directory in the examples directory represents an example project and is intended to have tests that ensure the canisters contained in that example function properly.
# These tests are currently written in TypeScript and are intended to be run in a Node.js environment.
# This GitHub Action takes care of deploying to PyPI and GitHub.
# Tests can either run against the current code of Basilisk found in the repository, or the code deployed by the GitHub Action to PyPI.
# Feature branch pull requests (pull requests without release-- in the base branch name) will run all tests against the code found in the repository.
# Release branch pull requests (pull requests with release-- in the base branch name) will run all tests against the code found in the repository and the code deployed by the GitHub Action to PyPI.
# Pushes to main will run all tests against the code in the repository if the latest commit was not a merge of a release branch, and will run tests against the code in the repository and the code deployed by the GitHub Action to PyPI otherwise.
# The basic-integration-tests matrix spins up one job per combination of example directory and code source (repo or pypi).
# The check-basic-integration-tests-success job is designed to ensure that all jobs spun up from the matrix in the basic-integration-tests have succeeded

name: Basilisk Tests
on:
    push:
        branches:
            - main
    pull_request: # Runs on pull requests to any branch
jobs:
    release-candidate-deploy:
        runs-on: ubuntu-latest
        env:
            GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }} # All commits must be verified
            PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        outputs:
            # These outputs are used to pass information along to the next job
            should_run_tests: ${{ steps.should_run_tests.outputs.should_run_tests }} # We only want the next job to run the tests once we have finished deploying to PyPI and GitHub
            example_directories: ${{ steps.example_directories.outputs.example_directories }}
        steps:
            - uses: actions/checkout@v4
              # if: contains(github.head_ref, 'release--')
              with:
                  ref: ${{ contains(github.head_ref, 'release--') && github.event.pull_request.head.ref || github.ref }} # This is necessary for this job to be able to commit and push to the origin remote properly
                  token: ${{ secrets.LASTMJS_GITHUB_TOKEN || github.token }} # A personal GitHub token is setup as a secret so that committing and pushing to GitHub from the Action will trigger another workflow
            - if: contains(github.head_ref, 'release--')
              name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.23.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH
            # TODO we should use some Action-specific bot account
            - if: contains(github.head_ref, 'release--')
              run: git config --global user.name 'Jordan Last'
            - if: contains(github.head_ref, 'release--')
              run: git config --global user.email 'jordan.michael.last@gmail.com'
            - if: contains(github.head_ref, 'release--')
              run: git config --global commit.gpgsign true
            - if: contains(github.head_ref, 'release--')
              run: echo -n "$GPG_SIGNING_KEY" | base64 --decode | gpg --import
            - if: contains(github.head_ref, 'release--')
              run: git config --global user.signingkey C8B77BCBE16CD2B94B43F9C8757397B82D4ED7B0
            - if: contains(github.head_ref, 'release--')
              run: curl https://pyenv.run | bash
            - if: contains(github.head_ref, 'release--')
              run: ~/.pyenv/bin/pyenv install 3.10.7
            - id: example_directories
              # TODO to improve this further we might be able to create an environment variable that grabs the example directories with a glob
              # TODO we want to be able to easily include and exclude examples though
              run: |
                  EXAMPLE_DIRECTORIES=$(cat << END
                  [
                    "examples/annotated_tests",
                    "examples/audio_recorder",
                    "examples/bitcoin",
                    "examples/blob_array",
                    "examples/bytes",
                    "examples/call_raw",
                    "examples/candid_encoding",
                    "examples/complex_init",
                    "examples/complex_types",
                    "examples/composite_queries",
                    "examples/counter",
                    "examples/cross_canister_calls",
                    "examples/cycles",
                    "examples/date",
                    "examples/ethereum_json_rpc",
                    "examples/func_types",
                    "examples/generators",
                    "examples/guard_functions",
                    "examples/heartbeat",
                    "examples/ic_api",
                    "examples/imports",
                    "examples/init_and_post_upgrade_recovery",
                    "examples/init",
                    "examples/inspect_message",
                    "examples/key_value_store",
                    "examples/keywords",
                    "examples/ledger_canister",
                    "examples/list_of_lists",
                    "examples/management_canister",
                    "examples/manual_reply",
                    "examples/motoko_examples/calc",
                    "examples/motoko_examples/counter",
                    "examples/motoko_examples/echo",
                    "examples/motoko_examples/factorial",
                    "examples/motoko_examples/hello",
                    "examples/motoko_examples/hello-world",
                    "examples/motoko_examples/http_counter",
                    "examples/motoko_examples/persistent-storage",
                    "examples/motoko_examples/phone-book",
                    "examples/motoko_examples/quicksort",
                    "examples/motoko_examples/simple-to-do",
                    "examples/motoko_examples/superheroes",
                    "examples/motoko_examples/threshold_ecdsa",
                    "examples/motoko_examples/whoami",
                    "examples/notify_raw",
                    "examples/null_example",
                    "examples/optional_types",
                    "examples/outgoing_http_requests",
                    "examples/pre_and_post_upgrade",
                    "examples/primitive_types",
                    "examples/principal",
                    "examples/query",
                    "examples/randomness",
                    "examples/rejections",
                    "examples/service",
                    "examples/simple_erc20",
                    "examples/simple_user_accounts",
                    "examples/stable_memory",
                    "examples/stable_structures",
                    "examples/stdlib",
                    "examples/timers",
                    "examples/tuple_types",
                    "examples/update"
                  ]
                  END
                  )
                  echo "example_directories<<EOF" >> $GITHUB_OUTPUT
                  echo "$EXAMPLE_DIRECTORIES" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT
            - id: should_run_tests
              run: |
                  BRANCH_NAME="${{ github.head_ref }}"
                  RELEASE_VERSION="${BRANCH_NAME:9}"
                  COMMIT_MESSAGE=$(git log -1 --pretty=format:"%s")
                  if [[ "${{ contains(github.head_ref, 'release--') }}" == "true" && "$COMMIT_MESSAGE" != "basilisk-bot automated release $RELEASE_VERSION" ]]
                  then
                    ./publish-github-action.sh $RELEASE_VERSION ${{ toJSON(steps.example_directories.outputs.example_directories) }}
                  else
                    echo "should_run_tests=true" >> $GITHUB_OUTPUT
                  fi
    rustpython-integration-tests:
        if: false  # Inactive: basilisk now defaults to CPython backend; kept for reference
        needs: release-candidate-deploy
        runs-on: ubuntu-latest
        env:
            ETHEREUM_URL: ${{ secrets.ETHEREUM_URL }}
            BASILISK_COMPILE_RUST_PYTHON_STDLIB: ${{ matrix.basilisk_source == 'repo' }}
        strategy:
            fail-fast: false # We want to see which example tests succeed and which ones fail, we don't want one example test to cancel the rest
            matrix:
                # TODO perhaps we should start testing on different versions of dfx as well
                include_pypi:
                    # Only include pypi in the matrix if you've pushed to main and the last commit was a merge of a release branch, or the base branch of the pull request is a release branch
                    - ${{ (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'Merge pull request') && contains(github.event.head_commit.message, 'smart-social-contracts/release--')) || contains(github.head_ref, 'release--') }}
                basilisk_source:
                    - pypi
                    - repo
                exclude:
                    - include_pypi: false
                      basilisk_source: pypi
                # If should_run_tests is false, we still want the steps of this job to execute so that check-basic-integration-tests-success will run. We do this by creating an array with one dummy element
                example_directories: ${{ needs.release-candidate-deploy.outputs.should_run_tests == 'true' && fromJSON(needs.release-candidate-deploy.outputs.example_directories) || fromJSON('["dummy"]') }}
        steps:
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              uses: actions/checkout@v4
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              uses: actions/cache@v4
              with:
                  path: ~/.config/basilisk
                  key: basilisk-cargo-${{ hashFiles('basilisk/cargotoml.py') }}
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              uses: actions/cache@v4
              with:
                  path: ~/.cache/dfinity
                  key: basilisk-dfx-0.23.0
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.23.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              working-directory: ${{ matrix.example_directories }}
              run: curl https://pyenv.run | bash
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              working-directory: ${{ matrix.example_directories }}
              run: ~/.pyenv/bin/pyenv install 3.10.7
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              working-directory: ${{ matrix.example_directories }}
              run: ~/.pyenv/versions/3.10.7/bin/python -m venv venv
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests && matrix.basilisk_source == 'repo' && !startsWith(matrix.example_directories, 'examples/motoko_examples') }}
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}
              run: source venv/bin/activate && pip install ../..
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests && matrix.basilisk_source == 'repo' && startsWith(matrix.example_directories, 'examples/motoko_examples') }}
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}
              run: source venv/bin/activate && pip install ../../..
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests && matrix.basilisk_source == 'pypi' }}
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}
              run: source venv/bin/activate && pip install -r requirements.txt
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              working-directory: ${{ matrix.example_directories }}
              run: source venv/bin/activate && python -m basilisk install-dfx-extension
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              working-directory: ${{ matrix.example_directories }}
              run: dfx start --clean --background --host 127.0.0.1:8000
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}/test
              run: source ../venv/bin/activate && npm install
            - if: ${{ needs.release-candidate-deploy.outputs.should_run_tests }}
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}/test
              run: source ../venv/bin/activate && npm test

    cpython-integration-tests:
        needs: release-candidate-deploy
        runs-on: ubuntu-latest
        continue-on-error: true  # Many examples use features not yet in CPython template; don't block gate
        if: ${{ needs.release-candidate-deploy.outputs.should_run_tests == 'true' }}
        env:
            BASILISK_PYTHON_BACKEND: cpython
            BASILISK_COMPILE_RUST_PYTHON_STDLIB: false
            WASI_SDK_VERSION: "24"
            WASI_SDK_PATH: /home/runner/.local/share/wasi-sdk
        strategy:
            fail-fast: false
            matrix:
                # Full coverage: all example directories (migrated from rustpython-integration-tests).
                example_directories:
                    - "examples/annotated_tests"
                    - "examples/audio_recorder"
                    - "examples/bitcoin"
                    - "examples/blob_array"
                    - "examples/bytes"
                    - "examples/call_raw"
                    - "examples/candid_encoding"
                    - "examples/complex_init"
                    - "examples/complex_types"
                    - "examples/composite_queries"
                    - "examples/counter"
                    - "examples/cross_canister_calls"
                    - "examples/cycles"
                    - "examples/date"
                    - "examples/ethereum_json_rpc"
                    - "examples/func_types"
                    - "examples/generators"
                    - "examples/guard_functions"
                    - "examples/heartbeat"
                    - "examples/ic_api"
                    - "examples/imports"
                    - "examples/init_and_post_upgrade_recovery"
                    - "examples/init"
                    - "examples/inspect_message"
                    - "examples/key_value_store"
                    - "examples/keywords"
                    - "examples/ledger_canister"
                    - "examples/list_of_lists"
                    - "examples/management_canister"
                    - "examples/manual_reply"
                    - "examples/motoko_examples/calc"
                    - "examples/motoko_examples/counter"
                    - "examples/motoko_examples/echo"
                    - "examples/motoko_examples/factorial"
                    - "examples/motoko_examples/hello"
                    - "examples/motoko_examples/hello-world"
                    - "examples/motoko_examples/http_counter"
                    - "examples/motoko_examples/persistent-storage"
                    - "examples/motoko_examples/phone-book"
                    - "examples/motoko_examples/quicksort"
                    - "examples/motoko_examples/simple-to-do"
                    - "examples/motoko_examples/superheroes"
                    - "examples/motoko_examples/threshold_ecdsa"
                    - "examples/motoko_examples/whoami"
                    - "examples/notify_raw"
                    - "examples/null_example"
                    - "examples/optional_types"
                    - "examples/outgoing_http_requests"
                    - "examples/pre_and_post_upgrade"
                    - "examples/primitive_types"
                    - "examples/principal"
                    - "examples/query"
                    - "examples/randomness"
                    - "examples/rejections"
                    - "examples/service"
                    - "examples/simple_erc20"
                    - "examples/simple_user_accounts"
                    - "examples/stable_memory"
                    - "examples/stable_structures"
                    - "examples/stdlib"
                    - "examples/timers"
                    - "examples/tuple_types"
                    - "examples/update"
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Cache basilisk cargo
              uses: actions/cache@v4
              with:
                  path: ~/.config/basilisk
                  key: basilisk-cargo-cpython-v3-${{ hashFiles('basilisk/cargotoml.py') }}

            - name: Cache dfx
              uses: actions/cache@v4
              with:
                  path: ~/.cache/dfinity
                  key: basilisk-dfx-0.29.0

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.29.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Install WASI SDK
              run: |
                  curl -LO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  tar xzf wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  mv wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux ~/.local/share/wasi-sdk

            - name: Install wasm-opt (binaryen)
              run: |
                  curl -L https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz -o /tmp/binaryen.tar.gz
                  tar xzf /tmp/binaryen.tar.gz -C /tmp
                  sudo cp /tmp/binaryen-version_116/bin/wasm-opt /usr/local/bin/
                  wasm-opt --version

            - name: Pre-download CPython wasm
              run: |
                  VERSION=$(python3 -c "import ast; t=ast.parse(open('basilisk/__init__.py').read()); print([n.value.value for n in ast.walk(t) if isinstance(n, ast.Assign) and any(t.id=='__version__' for t in n.targets if isinstance(t, ast.Name))][0])")
                  CPYTHON_DIR="$HOME/.config/basilisk/${VERSION}/cpython_wasm"
                  if [ ! -f "${CPYTHON_DIR}/lib/libpython3.13.a" ] || [ ! -f "${CPYTHON_DIR}/lib/libz.a" ]; then
                    mkdir -p "${CPYTHON_DIR}"
                    echo "Downloading CPython wasm artifacts..."
                    curl -Lf https://github.com/smart-social-contracts/basilisk/releases/download/cpython-wasm-3.13.0/cpython-wasm32-wasip1.tar.gz -o /tmp/cpython-wasm.tar.gz
                    tar -xzf /tmp/cpython-wasm.tar.gz -C "${CPYTHON_DIR}"
                    echo "CPython wasm installed to ${CPYTHON_DIR}"
                    ls -la "${CPYTHON_DIR}/lib/libpython3.13.a"
                  else
                    echo "CPython wasm already cached at ${CPYTHON_DIR}"
                  fi

            - working-directory: ${{ matrix.example_directories }}
              run: curl https://pyenv.run | bash
            - working-directory: ${{ matrix.example_directories }}
              run: ~/.pyenv/bin/pyenv install 3.10.7
            - working-directory: ${{ matrix.example_directories }}
              run: ~/.pyenv/versions/3.10.7/bin/python -m venv venv

            - name: Install basilisk from repo
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}
              run: |
                  if [[ "${{ matrix.example_directories }}" == examples/motoko_examples/* ]]; then
                    source venv/bin/activate && pip install ../../..
                  else
                    source venv/bin/activate && pip install ../..
                  fi

            - working-directory: ${{ matrix.example_directories }}
              run: source venv/bin/activate && python -m basilisk install-dfx-extension

            - name: Configure system subnet for PocketIC
              run: |
                  mkdir -p ~/.config/dfx
                  echo '{"local":{"type":"ephemeral","replica":{"subnet_type":"system"}}}' > ~/.config/dfx/networks.json

            - working-directory: ${{ matrix.example_directories }}
              run: dfx start --clean --background --host 127.0.0.1:8000 --pocketic

            - name: Deploy and test
              shell: bash -l {0}
              working-directory: ${{ matrix.example_directories }}/test
              timeout-minutes: 65
              run: source ../venv/bin/activate && npm install && npm test

    cpython-ic-deploy:
        needs: release-candidate-deploy
        runs-on: ubuntu-latest
        if: ${{ needs.release-candidate-deploy.outputs.should_run_tests == 'true' }}
        env:
            BASILISK_PYTHON_BACKEND: cpython
            BASILISK_COMPILE_RUST_PYTHON_STDLIB: false
            WASI_SDK_VERSION: "24"
            WASI_SDK_PATH: /home/runner/.local/share/wasi-sdk
            DFX_WARNING: -mainnet_plaintext_identity
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Cache basilisk cargo
              uses: actions/cache@v4
              with:
                  path: ~/.config/basilisk
                  key: basilisk-cargo-cpython-v3-${{ hashFiles('basilisk/cargotoml.py') }}

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=0.29.0 sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Install WASI SDK
              run: |
                  curl -LO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  tar xzf wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz
                  mv wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux ~/.local/share/wasi-sdk

            - name: Install wasm-opt (binaryen)
              run: |
                  curl -L https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz -o /tmp/binaryen.tar.gz
                  tar xzf /tmp/binaryen.tar.gz -C /tmp
                  sudo cp /tmp/binaryen-version_116/bin/wasm-opt /usr/local/bin/
                  wasm-opt --version

            - name: Pre-download CPython wasm
              run: |
                  VERSION=$(python3 -c "import ast; t=ast.parse(open('basilisk/__init__.py').read()); print([n.value.value for n in ast.walk(t) if isinstance(n, ast.Assign) and any(t.id=='__version__' for t in n.targets if isinstance(t, ast.Name))][0])")
                  CPYTHON_DIR="$HOME/.config/basilisk/${VERSION}/cpython_wasm"
                  if [ ! -f "${CPYTHON_DIR}/lib/libpython3.13.a" ] || [ ! -f "${CPYTHON_DIR}/lib/libz.a" ]; then
                    mkdir -p "${CPYTHON_DIR}"
                    curl -Lf https://github.com/smart-social-contracts/basilisk/releases/download/cpython-wasm-3.13.0/cpython-wasm32-wasip1.tar.gz -o /tmp/cpython-wasm.tar.gz
                    tar -xzf /tmp/cpython-wasm.tar.gz -C "${CPYTHON_DIR}"
                  fi

            - name: Setup Python environment
              working-directory: examples/query
              run: |
                  curl https://pyenv.run | bash
                  ~/.pyenv/bin/pyenv install 3.10.7
                  ~/.pyenv/versions/3.10.7/bin/python -m venv venv

            - name: Install basilisk from repo
              shell: bash -l {0}
              working-directory: examples/query
              run: source venv/bin/activate && pip install ../..

            - name: Install dfx extension
              working-directory: examples/query
              run: source venv/bin/activate && python -m basilisk install-dfx-extension

            - name: Import DFX identity for IC deployment
              run: |
                  if [ -z "${{ secrets.IC_IDENTITY_PEM }}" ]; then
                    echo "::error::IC_IDENTITY_PEM secret is not set. Add the PEM file contents as a repository secret."
                    exit 1
                  fi
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Build canister wasm
              shell: bash -l {0}
              working-directory: examples/query
              timeout-minutes: 10
              run: |
                  source venv/bin/activate
                  CANISTER_CANDID_PATH=query.did python -m basilisk query src/main.py

            - name: Deploy to IC mainnet
              working-directory: examples/query
              timeout-minutes: 15
              run: |
                  CANISTER_ID="2i66l-saaaa-aaaas-qe3sq-cai"
                  WASM_FILE=".basilisk/query/query.wasm"

                  if [ ! -f "${WASM_FILE}" ]; then
                    echo "::error::Wasm file not found at ${WASM_FILE}"
                    exit 1
                  fi
                  echo "Wasm size: $(wc -c < "${WASM_FILE}") bytes"

                  # Clear any leftover chunks from previous attempts
                  dfx canister call aaaaa-aa clear_chunk_store \
                    "(record { canister_id = principal \"${CANISTER_ID}\" })" \
                    --network ic --identity ci-deploy 2>/dev/null || true

                  # Install with --async-call: dfx may timeout but DTS completes in background
                  dfx canister install "${CANISTER_ID}" \
                    --wasm "${WASM_FILE}" \
                    --network ic --mode reinstall --yes \
                    --async-call --identity ci-deploy || true

                  # Poll for completion (up to 10 minutes)
                  for i in $(seq 1 20); do
                    sleep 30
                    STATUS=$(dfx canister status "${CANISTER_ID}" --network ic --identity ci-deploy 2>&1 || true)
                    if echo "$STATUS" | grep -q "Module hash: 0x"; then
                      echo "Canister installed after $((i * 30))s"
                      exit 0
                    fi
                    echo "Waiting for wasm installation... ($((i * 30))s)"
                  done

                  echo "::error::Canister did not install within 10 minutes"
                  exit 1

            - name: Verify deployment
              working-directory: examples/query
              run: |
                  CANISTER_ID="2i66l-saaaa-aaaas-qe3sq-cai"
                  RESULT=$(dfx canister call "${CANISTER_ID}" simple_query --network ic --identity ci-deploy 2>&1)
                  echo "Result: ${RESULT}"
                  if echo "${RESULT}" | grep -q "This is a query function"; then
                    echo "Deployment verified successfully"
                  else
                    echo "::error::Unexpected query result: ${RESULT}"
                    exit 1
                  fi

    check-basic-integration-tests-success:
        needs: [cpython-integration-tests, cpython-ic-deploy]
        runs-on: ubuntu-latest
        if: success()
        steps:
            - run: exit 0

    check-basic-integration-tests-failure:
        needs: [cpython-integration-tests, cpython-ic-deploy]
        runs-on: ubuntu-latest
        if: failure()
        steps:
            - run: exit 1
