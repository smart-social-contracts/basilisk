canisters:
- name: annotated_tests
  build:
    steps:
    - type: script
      commands:
      - python -m basilisk annotated_tests src/main.py
      - cp .basilisk/annotated_tests/annotated_tests.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/annotated_tests
    node_compatibility: true
