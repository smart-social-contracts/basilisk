canisters:
- name: principal
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/principal/principal.did python -m basilisk
        principal src/main.py
      - cp .basilisk/principal/principal.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/principal
    node_compatibility: true
