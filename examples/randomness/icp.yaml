canisters:
- name: randomness
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/randomness/randomness.did python -m basilisk
        randomness src/main.py
      - cp .basilisk/randomness/randomness.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/randomness
    node_compatibility: true
