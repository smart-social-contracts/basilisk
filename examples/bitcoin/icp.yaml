canisters:
- name: bitcoin
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/bitcoin/bitcoin.did python -m basilisk bitcoin
        src/main.py
      - cp .basilisk/bitcoin/bitcoin.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/bitcoin
    node_compatibility: true
defaults:
  bitcoin:
    enabled: true
    nodes:
    - 127.0.0.1:18444
    log_level: info
networks:
  local:
    bind: 127.0.0.1:8000
    type: ephemeral
