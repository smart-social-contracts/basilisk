canisters:
- name: bytes
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/bytes/bytes.did python -m basilisk bytes src/main.py
      - cp .basilisk/bytes/bytes.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/bytes
    node_compatibility: true
