canisters:
- name: simple_erc20
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/simple_erc20/simple_erc20.did python -m basilisk
        simple_erc20 src/main.py
      - cp .basilisk/simple_erc20/simple_erc20.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/simple_erc20
    node_compatibility: true
