canisters:
- name: canister1
  build:
    steps:
    - type: script
      commands:
      - python -m basilisk canister1 canisters/canister1/canister1.py
      - cp .basilisk/canister1/canister1.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/canister1
    node_compatibility: true
- name: canister2
  build:
    steps:
    - type: script
      commands:
      - python -m basilisk canister2 canisters/canister2/canister2.py
      - cp .basilisk/canister2/canister2.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/canister2
    node_compatibility: true
