canisters:
- name: rejections
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/rejections/rejections.did python -m basilisk
        rejections src/rejections/rejections.py
      - cp .basilisk/rejections/rejections.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/rejections
    node_compatibility: true
- name: some_service
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/some_service/some_service.did python -m basilisk
        some_service src/some_service/some_service.py
      - cp .basilisk/some_service/some_service.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/some_service
    node_compatibility: true
