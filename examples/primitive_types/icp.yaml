canisters:
- name: primitive_types
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/primitive_types/primitive_types.did python
        -m basilisk primitive_types src/main.py
      - cp .basilisk/primitive_types/primitive_types.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/primitive_types
    node_compatibility: true
