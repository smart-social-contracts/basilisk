canisters:
- name: echo
  build:
    steps:
    - type: script
      commands:
      - CANISTER_CANDID_PATH=.basilisk/echo/echo.did python -m basilisk echo src/main.py
      - cp .basilisk/echo/echo.wasm "$ICP_WASM_OUTPUT_PATH"
  declarations:
    output: test/dfx_generated/echo
    node_compatibility: true
